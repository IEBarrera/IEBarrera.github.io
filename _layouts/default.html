<!doctype html>
<html lang="{{ page.lang | default: 'es' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != "/" and page.url != "/en/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  {% if page.translation_url %}<link rel="alternate" hreflang="{% if page.lang == 'en' %}es{% else %}en{% endif %}" href="{{ page.translation_url | relative_url }}">{% endif %}
  <link rel="preconnect" href="/">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">IE&nbsp;Barrera</a>
    <nav class="site-nav">
      {% if page.lang == 'en' %}
      <a href="{{ '/en/' | relative_url }}">Home</a>
      {% else %}
      <a href="{{ '/' | relative_url }}">Home</a>
      {% endif %}
      {% if page.translation_url %}
      <a class="lang-switch" href="{{ page.translation_url | relative_url }}">{% if page.lang == 'en' %}ES{% else %}EN{% endif %}</a>
      {% endif %}
    </nav>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ site.time | date: "%Y" }} {{ site.author }}</span>
    <span class="dot">·</span>
    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
  </footer>
</body>
</html>
