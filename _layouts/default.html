<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title and page.url != "/" %}{{ page.title }} · {{ site.title }}{% else %}{{ site.title }} — {{ site.tagline }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="/">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>
  <header class="site-header">
    <a class="brand" href="{{ '/' | relative_url }}">IE&nbsp;Barrera</a>
    <nav class="site-nav">
      <a href="{{ '/' | relative_url }}">Home</a>
      <a href="{{ '/sobre-mi/' | relative_url }}">About</a>
    </nav>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <span>© {{ site.time | date: "%Y" }} {{ site.author }}</span>
    <span class="dot">·</span>
    <a href="mailto:{{ site.email }}">{{ site.email }}</a>
  </footer>
</body>
</html>
