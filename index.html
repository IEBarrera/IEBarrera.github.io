<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Geometry viewer — Resumen comparativo</title>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#1b1d23;color:#e6e6e6;
     height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* Header */
#bar{padding:7px 14px;background:#23262e;border-bottom:1px solid #333;flex-shrink:0}
#bar h1{font-size:14px;font-weight:600}
#bar .info{font-size:11px;color:#a9b2c0;margin-top:2px}

/* Controls bar */
#controls{padding:5px 14px;background:#23262e;border-bottom:1px solid #333;
          flex-shrink:0;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.ctrl-sep{width:1px;height:16px;background:#3a3f52;flex-shrink:0}
label.ctrl{cursor:pointer;font-size:12px;display:flex;align-items:center;gap:4px;
           -webkit-user-select:none;user-select:none;white-space:nowrap}
label.ctrl input{cursor:pointer}
.chip{display:inline-block;width:9px;height:9px;border-radius:2px;vertical-align:middle}

button.btn{background:#2a2f3d;border:1px solid #404558;color:#d6dae6;
           padding:3px 10px;border-radius:4px;font-size:12px;cursor:pointer;
           white-space:nowrap;transition:background .12s}
button.btn:hover{background:#353a4e}
button.btn.accent{background:#2d5491;border-color:#4472b8}
button.btn.accent:hover{background:#3664a8}

/* Export dropdown */
.drop-wrap{position:relative}
.drop-wrap:focus-within .drop-menu,
.drop-wrap:hover .drop-menu{display:block}
.drop-menu{display:none;position:absolute;top:calc(100% + 4px);right:0;
           background:#2a2f3d;border:1px solid #404558;border-radius:5px;
           min-width:200px;z-index:200;box-shadow:0 6px 18px rgba(0,0,0,.5)}
.drop-menu button{display:block;width:100%;text-align:left;
                  padding:7px 13px;background:none;border:none;
                  color:#d6dae6;cursor:pointer;font-size:12px}
.drop-menu button:hover{background:#353a4e}
.drop-menu hr{border:none;border-top:1px solid #404558;margin:2px 0}

/* Main area */
#main{display:flex;flex:1;overflow:hidden}
#viewer-wrap{flex:1;position:relative;overflow:hidden}

/* Side panel */
#panel{width:270px;background:#202330;border-left:1px solid #333;
       display:flex;flex-direction:column;overflow:hidden;
       transition:width .2s ease}
#panel.collapsed{width:0;border:none}
#panel-hdr{padding:7px 10px;border-bottom:1px solid #333;font-size:12px;
           font-weight:600;display:flex;justify-content:space-between;
           align-items:center;flex-shrink:0;white-space:nowrap;overflow:hidden}
#panel-hdr .close-btn{background:none;border:none;color:#7a8898;cursor:pointer;
                       font-size:15px;line-height:1;padding:0 2px}
#panel-hdr .close-btn:hover{color:#e6e6e6}
#panel-body{overflow-y:auto;flex:1;padding:4px 0}

/* Interaction groups */
.ig{margin-bottom:2px}
.ig-hdr{padding:5px 10px;font-size:11px;font-weight:700;color:#7a8898;
        display:flex;align-items:center;gap:5px;cursor:pointer;-webkit-user-select:none;user-select:none;
        text-transform:uppercase;letter-spacing:.06em}
.ig-hdr:hover{color:#b0bac8}
.ig-caret{font-size:9px;transition:transform .15s;display:inline-block;flex-shrink:0}
.ig-caret.open{transform:rotate(90deg)}
.ig-badge{background:#2e3345;padding:1px 6px;border-radius:8px;
          font-size:10px;font-weight:400;color:#8896a8}
.ig-toggle-all{margin-left:auto;font-size:10px;color:#556070;flex-shrink:0}
.ig-toggle-all:hover{color:#a0b0c0}
.ig-items{display:none}
.ig-items.open{display:block}

.irow{padding:3px 10px 3px 16px;font-size:11px;display:flex;align-items:center;
      gap:6px;cursor:default;border-radius:3px;margin:1px 4px}
.irow:hover{background:#2a2f3d}
.irow input[type=checkbox]{cursor:pointer;flex-shrink:0}
.irow .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.dot-broken{background:#ff4d4d}
.dot-formed{background:#39d353}
.dot-matched{background:#f0c040}
.ir-lbl{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.ir-dist{font-size:10px;color:#607080;white-space:nowrap;flex-shrink:0}

/* Contact section */
.panel-rule{height:1px;background:#2e3345;margin:6px 0}
.csec{padding:8px 10px 10px}
.csec-hdr{font-size:11px;font-weight:700;color:#7a8898;text-transform:uppercase;
          letter-spacing:.06em;margin-bottom:7px}
.csec-top{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:11px;
          flex-wrap:wrap}
.csec-top label{display:flex;align-items:center;gap:3px;cursor:pointer;-webkit-user-select:none;user-select:none}
.num-in{width:46px;background:#161820;border:1px solid #404558;color:#c8d8e8;
        padding:2px 5px;border-radius:3px;font-size:11px;text-align:center}
.elem-grid{display:grid;grid-template-columns:26px 50px 1fr;gap:3px 6px;
           align-items:center;font-size:11px}
.elem-sym{font-weight:700;color:#9ab8d8}
.elem-found{font-size:10px;color:#506070;white-space:nowrap}

/* Pair chips */
.csec-sub{font-size:10px;font-weight:700;color:#506070;text-transform:uppercase;
          letter-spacing:.06em;margin:9px 0 5px}
.pair-grid{display:flex;flex-wrap:wrap;gap:4px}
.pair-chip{padding:2px 8px;border-radius:10px;font-size:11px;cursor:pointer;
           -webkit-user-select:none;user-select:none;border:1px solid #2e3a4a;background:#1a2230;color:#6080a0;
           transition:all .12s}
.pair-chip:hover{border-color:#4a6080;color:#90b8d8}
.pair-chip.on{background:#163050;border-color:#4a80c0;color:#80c0f0}

/* Contact distance list */
#contactList{margin-top:4px}
.clist-row{display:flex;justify-content:space-between;align-items:center;
           padding:3px 8px 3px 7px;margin:2px 0;border-radius:3px;
           background:#161c28;font-size:11px}
.clist-src{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.clist-atoms{flex:1;color:#8aaccc;margin:0 6px;font-family:monospace;font-size:11px;
             overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.clist-dist{color:#e0f0ff;font-weight:600;font-size:12px;white-space:nowrap}

/* Mode selects */
#modelMode,#renderMode{background:#2a2f3d;border:1px solid #404558;color:#d6dae6;
                        padding:2px 5px;border-radius:3px;font-size:12px;cursor:pointer}

/* Export area frame */
#render-frame{position:absolute;pointer-events:none;box-sizing:border-box;z-index:10;
              border:1px dashed rgba(255,255,255,0.35);outline:1px solid rgba(0,0,0,0.25)}
#render-frame::before{content:"export area";position:absolute;top:5px;right:7px;
                      font-size:9px;color:rgba(255,255,255,0.28);letter-spacing:.08em;
                      font-family:monospace;text-transform:uppercase}

/* ── Resume nav ── */
#resume-nav{display:flex;align-items:center;gap:10px;padding:5px 14px;
            background:#161a24;border-bottom:1px solid #252a38;flex-wrap:wrap}
#resume-nav label{font-size:11px;color:#7a8898;display:flex;align-items:center;gap:5px}
#resume-nav select{background:#2a2f3d;border:1px solid #3a4050;color:#d6dae6;
                   padding:3px 6px;border-radius:4px;font-size:11px;cursor:pointer;max-width:220px}
.resume-info{flex:1;text-align:right;font-size:11px;color:#5a7090;
             white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:8px}
</style>
</head>
<body>
<div id="bar">
  <h1>Resumen comparativo</h1>
  <div class="info">3 datasets · 180 entradas</div>
</div>
<div id="resume-nav">
  <label>Dataset
    <select id="selDs">
      <option value="0">3 MOL</option>
      <option value="1">4 MOL</option>
      <option value="2">5 MOL</option>
    </select>
  </label>
  <label>Modelo / base
    <select id="selModel"></select>
  </label>
  <label>Índice
    <select id="selIdx"></select>
  </label>
  <span id="resume-info" class="resume-info"></span>
</div>
<div id="controls">
  <label class="ctrl"><input type="checkbox" id="cbHigh" checked aria-label="Mostrar high"> high</label>
  <label class="ctrl"><input type="checkbox" id="cbLow" checked aria-label="Mostrar low"> low</label>
  <label class="ctrl" title="Campo visual (°)">FOV <input type="range" id="fovSlider" min="10" max="90" value="45" aria-label="Campo visual" style="width:55px;cursor:pointer;vertical-align:middle"> <span id="fovVal" style="min-width:28px;display:inline-block">45°</span></label>
  <label class="ctrl" data-adv><input type="checkbox" id="cbLowElem" aria-label="Low por elemento"> low/elem</label>
  <div class="ctrl-sep" data-adv></div>
  <label class="ctrl" data-adv><input type="checkbox" id="cbDist" aria-label="Mostrar distancias"> distancias</label>
  <label class="ctrl" data-adv><input type="checkbox" id="cbLabels" aria-label="Mostrar etiquetas"> etiquetas</label>
  <label class="ctrl" data-adv title="Grosor de las líneas punteadas (relativo al tamaño de la molécula)">línea <input type="range" id="dashSlider" min="1" max="15" value="5" aria-label="Grosor de línea" style="width:55px;cursor:pointer;vertical-align:middle"> <span id="dashVal" style="min-width:14px;display:inline-block">5</span></label>
  <label class="ctrl" data-adv title="Grosor del contorno (outline)">contorno <input type="range" id="outlineSlider" min="0" max="8" step="0.5" value="3" aria-label="Grosor del contorno" style="width:55px;cursor:pointer;vertical-align:middle"> <span id="outlineVal" style="min-width:14px;display:inline-block">3</span></label>
  <label class="ctrl" data-adv title="Tamaño del texto de las etiquetas">texto <input type="range" id="labelSlider" min="0.3" max="3" step="0.1" value="1" aria-label="Tamaño del texto" style="width:55px;cursor:pointer;vertical-align:middle"> <span id="labelVal" style="min-width:24px;display:inline-block">1.0</span></label>
  <div class="ctrl-sep" data-adv></div>
  <label class="ctrl" data-adv>modelo
    <select id="modelMode">
      <option value="ballstick">Ball &amp; Stick</option>
      <option value="vdw">VdW</option>
      <option value="spheres">Esferas</option>
    </select>
  </label>
  <label class="ctrl" data-adv>render
    <select id="renderMode">
      <option value="normal">Normal</option>
      <option value="pbr">PBR</option>
    </select>
  </label>
  <div class="ctrl-sep" data-adv></div>
  <div class="drop-wrap" data-adv>
    <button class="btn accent">⬇ Exportar ▾</button>
    <div class="drop-menu">
      <label style="display:flex;align-items:center;gap:7px;padding:6px 13px;
                    font-size:12px;cursor:pointer;-webkit-user-select:none;user-select:none;color:#c8d4e0">
        <input type="checkbox" id="cbTransp" aria-label="Fondo transparente PNG"> fondo transparente (PNG)
      </label>
      <hr>
      <button onclick="exportSingle()">Vista actual</button>
      <hr>
      <button onclick="exportDualAngles()">High + Low — ángulos distintos</button>
      <button onclick="exportDual()">High + Low — mismo ángulo</button>
      <hr>
      <div style="padding:5px 13px 2px;font-size:11px;color:#8a9aaa;font-weight:600">Multi-export (mismo índice)</div>
      <div id="multiMkList" style="padding:2px 13px 6px;display:flex;flex-direction:column;gap:3px;max-height:150px;overflow-y:auto"></div>
      <label style="padding:2px 13px 6px;font-size:11px;color:#c0ccd8;display:flex;align-items:center;gap:5px;cursor:pointer"><input type="checkbox" id="cbMultiLabels"> Mostrar etiquetas en imagen</label>
      <button onclick="exportMulti()">Exportar funcionales seleccionados</button>
      <button onclick="exportMultiAngles()">Funcionales — ángulos distintos</button>
    </div>
  </div>
  <button class="btn" id="btnPanel" onclick="togglePanel()" data-adv>☰ Interacciones</button>
</div>
<div id="main">
  <div id="viewer-wrap"><div id="render-frame" data-adv></div><div id="capBar" style="display:none;position:absolute;left:50%;bottom:18px;transform:translateX(-50%);z-index:50;align-items:center;gap:10px;background:rgba(15,18,24,.92);padding:8px 12px;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.55)"><span id="capHint" style="font-size:12px;color:#c8d4e0"></span><button id="capCancel" style="padding:7px 12px;font-size:13px;color:#c8d4e0;background:#2a2f3a;border:none;border-radius:7px;cursor:pointer">Cancelar</button><button id="nextCapBtn" style="padding:7px 14px;font-size:13px;font-weight:600;color:#0b0e13;background:#5cc8ff;border:none;border-radius:7px;cursor:pointer">Siguiente ▶</button></div></div>
  <div id="panel" data-adv>
    <div id="panel-hdr">
      <span>Interacciones</span>
      <button class="close-btn" onclick="togglePanel()">✕</button>
    </div>
    <div id="panel-body"></div>
  </div>
</div>

let DATA = null;
const VIEWER_ONLY=false;

/* ── CPK palette + VDW radii ── */
const CPK={H:0xFFFFFF,He:0xD9FFFF,Li:0xCC80FF,B:0xFFB5B5,C:0x3a3a3a,
           N:0x3050F8,O:0xFF2010,F:0x90E050,Na:0xAB5CF2,Mg:0x8AFF00,
           Al:0xBFA6A6,Si:0xF0C8A0,P:0xFF8000,S:0xFFFF30,Cl:0x1FF01F,

const VDW={H:1.20,C:1.70,N:1.55,O:1.52,F:1.47,Si:2.10,P:1.80,S:1.80,
           Cl:1.75,Br:1.85,I:1.98,Na:2.27,K:2.75,Ca:2.31,Fe:2.05};

/* ── Style presets ── */

/* ── Scene ── */

/* ── Toon gradient map: 3 discrete bands (shadow / mid / highlight) ── */

/* El outline ya no se dibuja con geometría (inverted-hull): se calcula en post-proceso

/* ── Material factory ── */
function mkMat(color){
  if(isPBR()) return new THREE.MeshPhysicalMaterial({
    color, roughness:0.28, metalness:0.0,
    clearcoat:0.65, clearcoatRoughness:0.04,
    reflectivity:0.55,
    emissive:new THREE.Color(color), emissiveIntensity:0.05,
  });
  return new THREE.MeshToonMaterial({color,gradientMap:gradTex});
}

/* ── Dither transparency (Bayer 4×4 screen-door) ── */
const _DITHER_GLSL=`
  vec2 _fp=floor(mod(gl_FragCoord.xy,4.));
  float _bx=_fp.x,_by=_fp.y;
  float _r0=_by<1.?0.:_by<2.?12.:_by<3.?3.:15.;
  float _r1=_by<1.?8.:_by<2.?4.:_by<3.?11.:7.;
  float _r2=_by<1.?2.:_by<2.?14.:_by<3.?1.:13.;
  float _r3=_by<1.?10.:_by<2.?6.:_by<3.?9.:5.;
  float _thr=_bx<1.?_r0:_bx<2.?_r1:_bx<3.?_r2:_r3;
  if(_thr/16.>=0.5) discard;
`;
function _patchDither(mat){
  mat.onBeforeCompile=sh=>{
    sh.fragmentShader=sh.fragmentShader.replace(
      '#include <dithering_fragment>',
      _DITHER_GLSL+'\n#include <dithering_fragment>'
    );
  };
  mat.customProgramCacheKey=()=>'dither';
}
function applyDitherToGroup(group){
  group.traverse(o=>{
    if(!o.isMesh) return;
    const orig=o.material;
    const d=orig.clone();
    _patchDither(d);
    o.material=d;
    orig.dispose();
  });
}

/* ── Mesh builders ── */
function atomMesh(pos,sym,col){
  const mod=getMod();
  const r=eVdw(sym)*mod.ss;
  const g=new THREE.Group();
  const m=new THREE.Mesh(new THREE.SphereGeometry(r,32,22),mkMat(col));
  g.add(m);
  g.position.set(pos[0],pos[1],pos[2]);
  return g;
}

function stickMesh(p1,p2,col,rCut1=0,rCut2=0){
  const mod=getMod(); if(mod.sr<=0) return null;
  const v1=new THREE.Vector3(...p1),v2=new THREE.Vector3(...p2);
  const dir=new THREE.Vector3().subVectors(v2,v1);
  const len=dir.length(); if(len<0.001) return null;
  const dirN=dir.clone().normalize();
  const mid=new THREE.Vector3().lerpVectors(v1,v2,0.5);
  const g=new THREE.Group();
  const m=new THREE.Mesh(new THREE.CylinderGeometry(mod.sr,mod.sr,len,16),mkMat(col));
  g.add(m);
  g.position.copy(mid);
  g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dirN);
  return g;
}

/* ── Scene groups ── */
const groupHigh=new THREE.Group(),groupLow=new THREE.Group();
const shapeHighGroup=new THREE.Group(),shapeLowGroup=new THREE.Group();
const shapeGroup=new THREE.Group(); shapeGroup.add(shapeHighGroup,shapeLowGroup);
const contactHighGroup=new THREE.Group(),contactLowGroup=new THREE.Group();
const contactGroup=new THREE.Group(); contactGroup.add(contactHighGroup,contactLowGroup);
const labelGroup=new THREE.Group();
scene.add(groupHigh,groupLow,shapeGroup,contactGroup,labelGroup);

/* ── Dispose helper ── */
function disposeGroup(g){
  g.traverse(o=>{
    if(o.geometry) o.geometry.dispose();
    if(o.material){
      const ms=Array.isArray(o.material)?o.material:[o.material];
      ms.forEach(m=>{if(m.map)m.map.dispose();m.dispose();});
    }
  });
  while(g.children.length>0) g.remove(g.children[0]);
}

/* ── Build a molecule group ── */
function buildMolGroup(group,coords,symbols,bonds,overrideColor){
  disposeGroup(group);
  const mod=getMod();
  coords.forEach((pos,i)=>{
    const col=overrideColor!==null?overrideColor:eColor(symbols[i]);
    group.add(atomMesh(pos,symbols[i],col));
  });
  if(mod.sr>0){
    (bonds||[]).forEach(([i,j])=>{
      const col=overrideColor!==null?overrideColor:BOND_COLOR;
      const m=stickMesh(coords[i],coords[j],col,eVdw(symbols[i])*mod.ss,eVdw(symbols[j])*mod.ss);
      if(m) group.add(m);
    });
  }
}

/* ── Camera fit ── */
function fitCamera(){
  const box=new THREE.Box3();
  [groupHigh,groupLow].forEach(g=>{
    if(g.visible&&g.children.length)
      g.traverse(o=>{if(o.isMesh) box.expandByObject(o);});
  });
  if(box.isEmpty()) return;
  const center=box.getCenter(new THREE.Vector3());
  const size=box.getSize(new THREE.Vector3());
  const maxDim=Math.max(size.x,size.y,size.z);
  const dist=(maxDim/2)/Math.tan(camera.fov*Math.PI/360)*1.6;
  camera.position.copy(center).add(new THREE.Vector3(0,0,dist));
  controls.target.copy(center); controls.update();
}

/* ── Refresh molecules ── */
function refresh(){
  const pbr=isPBR();
  renderer.toneMapping=pbr?THREE.ACESFilmicToneMapping:THREE.NoToneMapping;
  renderer.toneMappingExposure=pbr?1.15:1.0;
  const byEl=document.getElementById("cbLowElem").checked;
  const showH=document.getElementById("cbHigh").checked;
  const showL=document.getElementById("cbLow").checked;
  if(showH){
    buildMolGroup(groupHigh,DATA.high,DATA.symbols,DATA.bonds,null);
    if(VIEWER_ONLY&&showL) applyDitherToGroup(groupHigh);
  } else disposeGroup(groupHigh);
  groupHigh.visible=showH;
  if(showL) buildMolGroup(groupLow,DATA.low,DATA.symbols,DATA.bonds,byEl?null:LOW_COLOR_INT);
  else disposeGroup(groupLow);
  groupLow.visible=showL;
  shapeHighGroup.visible=showH; shapeLowGroup.visible=showL;
  contactHighGroup.visible=showH; contactLowGroup.visible=showL;
  rebuildShapes(); rebuildAtomLabels(); rebuildContacts();
}

/* ── Active interaction state (reinicializado en loadEntry) ── */
let active={broken:{},formed:{},matched:{}};

/* ── Dashed lines + distance labels ── */
function midpt(a,b){return[(a[0]+b[0])/2,(a[1]+b[1])/2,(a[2]+b[2])/2];}

function makeLabel(text,pos,hexInt){
  /* canvas supersampleado (SS×) para texto nítido: más téxels que píxeles de pantalla */
  const W=256, H=64, SS=Math.min(4,Math.max(2,Math.ceil(window.devicePixelRatio||1)+1));
  const cv=document.createElement("canvas"); cv.width=W*SS; cv.height=H*SS;
  const ctx=cv.getContext("2d");
  ctx.scale(SS,SS);
  ctx.clearRect(0,0,W,H);
  ctx.font="bold 40px 'Times New Roman', Times, serif";
  ctx.textAlign="center"; ctx.textBaseline="middle";
  /* halo blanco por DETRÁS del texto (glow), no un trazo centrado */
  ctx.fillStyle="#000000";
  ctx.shadowColor="rgba(255,255,255,0.95)"; ctx.shadowBlur=8;
  ctx.fillText(text,W/2,H/2);
  ctx.fillText(text,W/2,H/2);   /* 2ª pasada: refuerza el halo */
  ctx.shadowBlur=0;
  ctx.fillText(text,W/2,H/2);   /* texto negro nítido encima */
  const tex=new THREE.CanvasTexture(cv);
  tex.minFilter=THREE.LinearFilter; tex.magFilter=THREE.LinearFilter; tex.generateMipmaps=false;
  tex.anisotropy=renderer.capabilities.getMaxAnisotropy();
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,depthTest:false,transparent:true}));
  sp.position.set(pos[0],pos[1],pos[2]); sp.scale.set(1.2*labelSize,0.30*labelSize,1);
  return sp;
}

/* Escala del sistema = mayor extensión del bounding box (cacheada por DATA).
   El grosor de las líneas se hace relativo a esto → se ve igual sea cual sea el
   tamaño de la molécula o del canvas (la cámara encuadra a esta misma escala). */
let _ssCache={data:null,val:5};
function sceneScale(){
  if(_ssCache.data===DATA) return _ssCache.val;
  const all=((DATA&&DATA.high)||[]).concat((DATA&&DATA.low)||[]);
  let mn=[1e9,1e9,1e9],mx=[-1e9,-1e9,-1e9];
  all.forEach(c=>{for(let k=0;k<3;k++){if(c[k]<mn[k])mn[k]=c[k];if(c[k]>mx[k])mx[k]=c[k];}});
  const md=Math.max(mx[0]-mn[0],mx[1]-mn[1],mx[2]-mn[2]);
  _ssCache={data:DATA,val:(isFinite(md)&&md>0.001)?md:5};
  return _ssCache.val;
}
let dashThickFrac=0.005;   /* grosor de línea como fracción de sceneScale() (lo fija el slider) */
let labelSize=1.0;         /* multiplicador del tamaño del texto de las etiquetas (lo fija el slider) */

function addDashedLine(group,p1,p2,hexInt,dist){
  const v1=new THREE.Vector3(...p1),v2=new THREE.Vector3(...p2);
  const total=v1.distanceTo(v2); if(total<0.001) return;
  const dir=new THREE.Vector3().subVectors(v2,v1).normalize();
  const DASH=0.22,GAP=0.14,SEG=DASH+GAP,R=dashThickFrac*sceneScale();
  const mat=new THREE.MeshBasicMaterial({color:DASH_COLOR,side:THREE.DoubleSide});
  /* cada guion es un plano (2D): Y local = eje de la línea, ancho 2R; la cara mira a la
     cámara cada frame (ver billboardDashes), así se ve plano pero con grosor en mundo */
  const geo=new THREE.PlaneGeometry(2*R,DASH);
  let t=0;
  while(t+DASH<=total){
    const mid=v1.clone().addScaledVector(dir,t+DASH/2);
    const mesh=new THREE.Mesh(geo,mat);
    mesh.position.copy(mid);
    mesh.userData.billboard=true; mesh.userData.dashDir=dir;
    group.add(mesh);
    t+=SEG;
  }
  if(document.getElementById("cbDist")?.checked&&dist!=null)
    group.add(makeLabel(dist.toFixed(3)+" Å",midpt(p1,p2),hexInt));
}

/* ── Rebuild H-bond/interaction shapes ── */
function rebuildShapes(){
  disposeGroup(shapeHighGroup); disposeGroup(shapeLowGroup);
  DATA.broken.forEach((r,i)=>{
    if(active.broken[i])  addDashedLine(shapeHighGroup,DATA.high[r.i],DATA.high[r.j],0xffffff,r.high);
  });
  DATA.formed.forEach((r,i)=>{
    if(active.formed[i])  addDashedLine(shapeLowGroup,DATA.low[r.i], DATA.low[r.j], 0xffffff,r.low);
  });
  DATA.matched.forEach((r,i)=>{
    if(active.matched[i]) addDashedLine(shapeHighGroup,DATA.high[r.i],DATA.high[r.j],0xffffff,r.high);
  });
}

/* ── Atom labels ── */
function rebuildAtomLabels(){
  disposeGroup(labelGroup);
  if(!document.getElementById("cbLabels")?.checked) return;
  const W=128, H=48, SS=Math.min(4,Math.max(2,Math.ceil(window.devicePixelRatio||1)+1));
  DATA.symbols.forEach((sym,k)=>{

    const cv=document.createElement("canvas"); cv.width=W*SS; cv.height=H*SS;
    const ctx=cv.getContext("2d");

    ctx.fillStyle="white"; ctx.font="bold 22px 'Times New Roman', Times, serif";

    const tex=new THREE.CanvasTexture(cv);

    labelGroup.add(sp);

/* ── Molecule detection (recomputado en loadEntry) ── */
let molOf=[];

/* ── Contact finding ── */
const ELEM_DEF={H:1,O:2,N:2,F:1,S:2,Cl:1,Br:1,I:1,C:0,P:1};

function pairKey(a,b){return[a,b].sort().join(",");}
function getAllowedPairs(){
  const s=new Set();
  document.querySelectorAll(".pair-chip.on").forEach(ch=>s.add(ch.dataset.pair));
  return s.size?s:null;
}
function getElemCounts(){
  const m={};
  document.querySelectorAll(".elem-n-in").forEach(el=>{
    m[el.dataset.elem]=Math.max(0,parseInt(el.value)||0);
  });
  return m;
}
function findContacts(coords,elemCounts,cutoff,allowedPairs){
  const drawn=new Set(),result=[];
  const n=coords.length;
  for(let i=0;i<n;i++){
    const ei=DATA.symbols[i],cnt=elemCounts[ei]||0; if(!cnt) continue;
    const nbrs=[];
    for(let j=0;j<n;j++){
      if(molOf[i]===molOf[j]) continue;
      const ej=DATA.symbols[j];
      if(allowedPairs&&!allowedPairs.has(pairKey(ei,ej))) continue;
      const dx=coords[i][0]-coords[j][0],dy=coords[i][1]-coords[j][1],dz=coords[i][2]-coords[j][2];
      const d=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(d<cutoff) nbrs.push({j,d});
    }
    nbrs.sort((a,b)=>a.d-b.d);
    nbrs.slice(0,cnt).forEach(({j,d})=>{
      const key=Math.min(i,j)+","+Math.max(i,j);
      if(!drawn.has(key)){drawn.add(key);result.push({i,j,dist:d});}
    });
  }
  return result;
}

/* ── Contact list panel ── */
/* Contactos apagados a mano (clave = lado:i,j). Se respetan al redibujar las líneas. */
const contactOff=new Set();
const _lastCtcs={high:[],low:[]};   /* últimos contactos calculados (para redibujar sin recomputar) */
function _ctcKey(side,i,j){return side+":"+Math.min(i,j)+","+Math.max(i,j);}

/* Redibuja SOLO las líneas punteadas de contacto, respetando los apagados.
   No toca la lista del panel → al togglear no se pierde el scroll ni hay flicker. */
function _drawContactLines(){
  disposeGroup(contactHighGroup); disposeGroup(contactLowGroup);
  _lastCtcs.high.forEach(({i,j,dist})=>{ if(!contactOff.has(_ctcKey("H",i,j))) addDashedLine(contactHighGroup,DATA.high[i],DATA.high[j],0xffffff,dist); });
  _lastCtcs.low.forEach(({i,j,dist})=>{ if(!contactOff.has(_ctcKey("L",i,j))) addDashedLine(contactLowGroup,DATA.low[i], DATA.low[j], 0xffffff,dist); });
}

function drawContactList(highCtcs,lowCtcs){
  const div=document.getElementById("contactList"); if(!div) return;
  const rows=[
    ...highCtcs.map(c=>({...c,color:"#6699ff",side:"H"})),
    ...lowCtcs.map(c=>({...c,color:"#ffaa44",side:"L"}))
  ].sort((a,b)=>a.dist-b.dist);
  if(!rows.length){div.innerHTML="";return;}
  div.innerHTML=rows.map(c=>{
    const ei=DATA.symbols[c.i],ej=DATA.symbols[c.j];
    const key=_ctcKey(c.side,c.i,c.j), on=!contactOff.has(key);
    return `<div class="clist-row">`+
      `<input type="checkbox" class="clist-cb" data-key="${key}" ${on?"checked":""} title="Mostrar/ocultar esta línea" style="margin:0 5px 0 0;cursor:pointer;flex-shrink:0">`+
      `<span class="clist-src" style="background:${c.color}"></span>`+
      `<span class="clist-atoms">${ei}${c.i}&nbsp;—&nbsp;${ej}${c.j}</span>`+
      `<span class="clist-dist">${c.dist.toFixed(3)}&nbsp;Å</span></div>`;
  }).join("");
  div.querySelectorAll(".clist-cb").forEach(cb=>{
    cb.addEventListener("change",e=>{
      const k=e.target.dataset.key;
      if(e.target.checked) contactOff.delete(k); else contactOff.add(k);
      _drawContactLines();   /* solo líneas; la lista NO se reconstruye */
    });
  });
}

function updateElemFound(elemCounts){
  const cutoff=parseFloat(document.getElementById("contactCutoff")?.value)||4.0;
  document.querySelectorAll(".elem-n-in").forEach(el=>{
    const elem=el.dataset.elem,cnt=elemCounts[elem]||0;
    const f=document.getElementById("efound-"+elem);
    if(!cnt){if(f)f.textContent="—";return;}
    let total=0;
    [DATA.high,DATA.low].forEach(coords=>{
      for(let i=0;i<coords.length;i++){
        if(DATA.symbols[i]!==elem) continue;
        for(let j=0;j<coords.length;j++){
          if(molOf[i]===molOf[j]) continue;
          const dx=coords[i][0]-coords[j][0],dy=coords[i][1]-coords[j][1],dz=coords[i][2]-coords[j][2];
          if(Math.sqrt(dx*dx+dy*dy+dz*dz)<cutoff) total++;
        }
      }
    });
    if(f) f.textContent=total+" contactos";
  });
}

/* ── Rebuild contacts ── */
function rebuildContacts(){
  const cutoff=parseFloat(document.getElementById("contactCutoff")?.value)||4.0;
  const elemCounts=getElemCounts(),allowedPairs=getAllowedPairs();
  /* La lista/cálculo dependen SOLO de cbContactHigh/cbContactLow, no de la visibilidad
     de las moléculas (cbHigh/cbLow): así las distancias low siguen apareciendo en la
     lista aunque ocultes la capa low. Las LÍNEAS se ocultan solas vía
     contactLowGroup.visible (lo fija refresh según cbLow). */
  _lastCtcs.high=document.getElementById("cbContactHigh")?.checked
    ?findContacts(DATA.high,elemCounts,cutoff,allowedPairs):[];
  _lastCtcs.low=document.getElementById("cbContactLow")?.checked
    ?findContacts(DATA.low,elemCounts,cutoff,allowedPairs):[];
  _drawContactLines();
  updateElemFound(elemCounts);
  drawContactList(_lastCtcs.high,_lastCtcs.low);
}

/* ── Export ── */
function isTransp(){return document.getElementById("cbTransp")?.checked;}

function dlUri(uri,name){const a=document.createElement("a");a.href=uri;a.download=name;a.click();}

function capture(cb){
  if(isTransp()){
    const savedBg=scene.background;
    scene.background=null;
    renderer.setClearColor(0x000000,0);
    renderFrame();
    const uri=renderer.domElement.toDataURL("image/png");
    scene.background=savedBg;
    renderer.setClearColor(0x1b1d23,1);
    renderFrame();
    cb(uri,"png");
  } else {
    renderFrame();
    cb(renderer.domElement.toDataURL("image/jpeg",0.95),"jpg");
  }
}

function exportSingle(){capture((uri,ext)=>dlUri(uri,"geometry_view."+ext));}

/* Aísla la capa High o Low (átomos + interacciones + contactos). */
function _setExportLayer(which){
  const H=(which==='high');
  groupHigh.visible=H; groupLow.visible=!H;
  shapeHighGroup.visible=H; shapeLowGroup.visible=!H;
  contactHighGroup.visible=H; contactLowGroup.visible=!H;
}
function _restoreExportLayers(wasH,wasL){
  groupHigh.visible=wasH; groupLow.visible=wasL;
  shapeHighGroup.visible=wasH; shapeLowGroup.visible=wasL;
  contactHighGroup.visible=wasH; contactLowGroup.visible=wasL;
  if(!wasH) disposeGroup(groupHigh);
  if(!wasL) disposeGroup(groupLow);
}
/* Captura la vista actual como cuadrado SQ×SQ y devuelve el dataURL (restaura el tamaño). */
function _snapSquare(transp,SQ){
  const oldW=wrap.clientWidth, oldH=wrap.clientHeight, oldAsp=camera.aspect;
  renderer.setSize(SQ,SQ,false);
  camera.aspect=1; camera.updateProjectionMatrix();
  let uri;
  if(transp){
    const savedBg=scene.background;
    scene.background=null; renderer.setClearColor(0x000000,0);
    renderFrame();
    uri=renderer.domElement.toDataURL("image/png");
    scene.background=savedBg; renderer.setClearColor(0x1b1d23,1);
    renderFrame();
  } else {
    renderFrame();
    uri=renderer.domElement.toDataURL("image/jpeg",0.95);
  }
  renderer.setSize(oldW,oldH,false);
  camera.aspect=oldAsp; camera.updateProjectionMatrix();
  return uri;
}
/* Ensambla las dos imágenes (High izquierda, Low derecha) y descarga. */
function _assembleDual(uriH,uriL,transp,SQ){
  const iH=new Image(),iL=new Image();
  iH.onload=function(){iL.onload=function(){
    const cv=document.createElement("canvas");
    cv.width=SQ*2; cv.height=SQ;
    const ctx=cv.getContext("2d");
    if(transp){
      ctx.clearRect(0,0,cv.width,cv.height);
      ctx.drawImage(iH,0,0); ctx.drawImage(iL,SQ,0);
      dlUri(cv.toDataURL("image/png"),"geometry_dual.png");
    } else {
      ctx.fillStyle="#1b1d23"; ctx.fillRect(0,0,cv.width,cv.height);
      ctx.drawImage(iH,0,0); ctx.drawImage(iL,SQ,0);
      dlUri(cv.toDataURL("image/jpeg",0.95),"geometry_dual.jpg");
    }
  };iL.src=uriL;};
  iH.src=uriH;
}
function _ensureLayersBuilt(){
  const byEl=document.getElementById("cbLowElem").checked;
  if(!groupHigh.children.length) buildMolGroup(groupHigh,DATA.high,DATA.symbols,DATA.bonds,null);
  if(!groupLow.children.length)  buildMolGroup(groupLow, DATA.low, DATA.symbols,DATA.bonds,byEl?null:LOW_COLOR_INT);
}

/* High + Low al MISMO ángulo (captura ambas capas y ensambla). */
function exportDual(){
  const SQ=1600, transp=isTransp();
  const wasH=document.getElementById("cbHigh").checked;
  const wasL=document.getElementById("cbLow").checked;
  _ensureLayersBuilt();
  _setExportLayer('high'); const uriH=_snapSquare(transp,SQ);
  _setExportLayer('low');  const uriL=_snapSquare(transp,SQ);
  _restoreExportLayers(wasH,wasL);
  _assembleDual(uriH,uriL,transp,SQ);
}

/* ── High + Low con ÁNGULOS DISTINTOS (guiado por pasos) ──
   1) captura HIGH al ángulo actual; 2) aísla LOW y deja orbitar libremente;
   3) el botón "Siguiente" captura LOW al nuevo ángulo, ensambla y descarga. */
let _capState=null, _multiCap=null;
function exportDualAngles(){
  if(_capState||_multiCap) return;       // ya hay un flujo en curso
  const SQ=1600, transp=isTransp();
  const wasH=document.getElementById("cbHigh").checked;
  const wasL=document.getElementById("cbLow").checked;
  _ensureLayersBuilt();
  if(document.activeElement&&document.activeElement.blur) document.activeElement.blur();
  _setExportLayer('high');
  const uriH=_snapSquare(transp,SQ);    // HIGH al ángulo actual
  _setExportLayer('low');               // aislar LOW para reposicionar
  _capState={uriH,transp,wasH,wasL,SQ};
  _showCapBar("Coloca el ángulo para LOW y pulsa Siguiente","Siguiente ▶",_finishDualAngles);
}
function _finishDualAngles(){
  if(!_capState) return;
  const st=_capState; _capState=null; _hideCapBar();
  const uriL=_snapSquare(st.transp,st.SQ);   // LOW al nuevo ángulo
  _restoreExportLayers(st.wasH,st.wasL);
  _assembleDual(st.uriH,uriL,st.transp,st.SQ);
}
function _cancelDualAngles(){
  if(!_capState) return;
  _restoreExportLayers(_capState.wasH,_capState.wasL);
  _capState=null; _hideCapBar();
}
function _showCapBar(hint,nextLabel,onNext){
  const bar=document.getElementById("capBar"); if(!bar) return;
  document.getElementById("capHint").textContent=hint;
  const nb=document.getElementById("nextCapBtn"); nb.textContent=nextLabel; nb.onclick=onNext;
  bar.style.display="flex";
}
function _hideCapBar(){
  const bar=document.getElementById("capBar"); if(bar) bar.style.display="none";
}

/* ── Outline por post-proceso (detección de bordes: profundidad + normales) ──
   El contorno ya no es geometría inflada (inverted-hull). Ese método fallaba con
   átomos/enlaces interpenetrados: el casco inflado de un objeto quedaba físicamente
   DELANTE de otro y se dibujaba encima. Aquí el borde se calcula en screen-space a
   partir del depth+normal buffer, donde en cada pixel solo existe la superficie más
   cercana, así un objeto oculto nunca puede marcar contorno sobre otro. */
const _ppNormalMat=new THREE.MeshNormalMaterial();
const _ppDepthTex=new THREE.DepthTexture(1,1); _ppDepthTex.type=THREE.UnsignedIntType;
const _ppTarget=new THREE.WebGLRenderTarget(1,1,{
  minFilter:THREE.NearestFilter, magFilter:THREE.NearestFilter,
  format:THREE.RGBAFormat, depthTexture:_ppDepthTex, stencilBuffer:false
});
const _ppEdgeMat=new THREE.ShaderMaterial({
  uniforms:{
    tNormal:{value:_ppTarget.texture},
    tDepth:{value:_ppDepthTex},
    texel:{value:new THREE.Vector2(1,1)},
    cameraNear:{value:camera.near},
    cameraFar:{value:camera.far},
    outlineColor:{value:new THREE.Color(0x000000)},
    thickness:{value:3.0},       /* grosor a la resolución de referencia (_ppRefH px) */
    resScale:{value:1.0},        /* escala = min(w,h)/_ppRefH → grosor PROPORCIONAL a la resolución */
    depthBias:{value:0.013},     /* sensibilidad a saltos de profundidad (silueta/solapes) */
    normalBias:{value:0.45},     /* sensibilidad a pliegues (uniones átomo-enlace) */
    normalStrength:{value:0.0},  /* 0 = NO marcar uniones stick-ball; solo siluetas y solapes */
    edgeGain:{value:0.6},        /* solidez/extensión del contorno (sube = más sólido y ancho) */
    outlineOpacity:{value:1.0},
  },
  vertexShader:`
    varying vec2 vUv;
    void main(){ vUv=uv; gl_Position=vec4(position.xy,0.0,1.0); }
  `,
  fragmentShader:`
    varying vec2 vUv;
    uniform sampler2D tNormal;
    uniform highp sampler2D tDepth;
    uniform vec2 texel;
    uniform float cameraNear, cameraFar;
    uniform vec3 outlineColor;
    uniform float thickness, resScale, depthBias, normalBias, normalStrength, edgeGain, outlineOpacity;
    float linDepth(vec2 uv){
      float z=texture2D(tDepth,uv).x;
      float ndc=z*2.0-1.0;
      return (2.0*cameraNear*cameraFar)/(cameraFar+cameraNear-ndc*(cameraFar-cameraNear));
    }
    vec3 nrm(vec2 uv){ return texture2D(tNormal,uv).xyz*2.0-1.0; }
    /* edgeness por profundidad en un offset (0..1) */
    float dTap(vec2 off,float dc){
      float dn=linDepth(vUv+off);
      return smoothstep(depthBias*dc, depthBias*dc*3.0, abs(dc-dn));
    }
    void main(){
      float dc=linDepth(vUv);
      vec2 o=texel*(thickness*resScale);
      const float K=0.70710678;
      /* 12 muestras (anillo exterior de 8 + interior de 4): contorno grueso, isótropo
         y con cobertura gradual → anti-aliasing del borde en una sola pasada */
      float acc=0.0;
      acc+=dTap(vec2( o.x,0.0),dc);        acc+=dTap(vec2(-o.x,0.0),dc);
      acc+=dTap(vec2(0.0, o.y),dc);        acc+=dTap(vec2(0.0,-o.y),dc);
      acc+=dTap(vec2( o.x*K, o.y*K),dc);   acc+=dTap(vec2(-o.x*K, o.y*K),dc);
      acc+=dTap(vec2( o.x*K,-o.y*K),dc);   acc+=dTap(vec2(-o.x*K,-o.y*K),dc);
      acc+=dTap(vec2( o.x*0.5,0.0),dc);    acc+=dTap(vec2(-o.x*0.5,0.0),dc);
      acc+=dTap(vec2(0.0, o.y*0.5),dc);    acc+=dTap(vec2(0.0,-o.y*0.5),dc);
      float edge=clamp(acc*edgeGain,0.0,1.0);
      /* líneas de pliegue (uniones stick-ball) — apagadas por defecto (normalStrength=0) */
      if(normalStrength>0.0){
        vec3 nc=nrm(vUv);
        float ne=(1.0-dot(nc,nrm(vUv+vec2(o.x,0.0))))+(1.0-dot(nc,nrm(vUv+vec2(-o.x,0.0))))
                +(1.0-dot(nc,nrm(vUv+vec2(0.0,o.y))))+(1.0-dot(nc,nrm(vUv+vec2(0.0,-o.y))));
        float fg=step(dc, cameraFar*0.999);
        edge=max(edge, smoothstep(normalBias, normalBias*2.0, ne)*fg*normalStrength);
      }
      edge*=outlineOpacity;
      if(edge<=0.003) discard;
      gl_FragColor=vec4(outlineColor, edge);
    }
  `,
  transparent:true, depthTest:false, depthWrite:false,
  blending:THREE.NormalBlending, side:THREE.DoubleSide,
});
const _ppScene=new THREE.Scene();
const _ppCam=new THREE.OrthographicCamera(-1,1,1,-1,0,1);
const _ppQuad=new THREE.Mesh(new THREE.PlaneGeometry(2,2),_ppEdgeMat);
_ppQuad.frustumCulled=false; _ppScene.add(_ppQuad);

const _ppSize=new THREE.Vector2();
const _ppRefH=900;   /* resolución de referencia: a esta altura, thickness vale los px indicados */
function _ppEnsureSize(){
  renderer.getDrawingBufferSize(_ppSize);
  const w=Math.max(1,Math.floor(_ppSize.x)), h=Math.max(1,Math.floor(_ppSize.y));
  /* grosor proporcional a la resolución → on-screen y export se ven igual */
  _ppEdgeMat.uniforms.resScale.value=Math.min(w,h)/_ppRefH;
  if(_ppTarget.width===w && _ppTarget.height===h) return;
  _ppTarget.setSize(w,h);
  _ppDepthTex.image.width=w; _ppDepthTex.image.height=h; _ppDepthTex.needsUpdate=true;
  _ppEdgeMat.uniforms.texel.value.set(1.0/w,1.0/h);
}

/* Orienta cada guion (plano) para que su cara mire a la cámara, manteniendo su eje Y
   a lo largo de la línea → apariencia 2D plana pero con grosor en unidades de mundo. */
const _bbY=new THREE.Vector3(),_bbZ=new THREE.Vector3(),_bbX=new THREE.Vector3(),
      _bbP=new THREE.Vector3(),_bbM=new THREE.Matrix4();
function billboardDashes(){
  const camP=camera.position;
  [shapeGroup,contactGroup].forEach(g=>g.traverse(o=>{
    if(!o.userData||!o.userData.billboard) return;
    o.getWorldPosition(_bbP);
    _bbY.copy(o.userData.dashDir);                 /* eje de la línea (unitario) */
    _bbZ.subVectors(camP,_bbP);                    /* hacia la cámara */
    _bbZ.addScaledVector(_bbY,-_bbZ.dot(_bbY));    /* ortogonalizar contra el eje */
    if(_bbZ.lengthSq()<1e-8) return;               /* cámara casi alineada con la línea */
    _bbZ.normalize();
    _bbX.crossVectors(_bbY,_bbZ).normalize();
    _bbM.makeBasis(_bbX,_bbY,_bbZ);
    o.quaternion.setFromRotationMatrix(_bbM);
  }));
}

/* Render en 4 pasadas. Reemplaza a renderer.render(scene,camera) en todo el viewer. */
function renderFrame(){
  _ppEnsureSize();
  billboardDashes();
  const savedHex=renderer.getClearColor().getHex();
  const savedAlpha=renderer.getClearAlpha();
  const savedBg=scene.background;
  const vHigh=groupHigh.visible, vLow=groupLow.visible;
  const vShape=shapeGroup.visible, vContact=contactGroup.visible, vLabel=labelGroup.visible;

  /* Pass 1 — normales (view-space) + profundidad, SOLO átomos/enlaces.
     overrideMaterial ignora el dither, así el depth de la capa fantasma es sólido
     (sin agujeros que producirían un contorno punteado). */
  shapeGroup.visible=false; contactGroup.visible=false; labelGroup.visible=false;
  scene.background=null;
  scene.overrideMaterial=_ppNormalMat;
  renderer.setRenderTarget(_ppTarget);
  renderer.setClearColor(0x8080ff,1.0);
  renderer.clear(true,true,false);
  renderer.render(scene,camera);
  renderer.setRenderTarget(null);
  scene.overrideMaterial=null;

  /* Pass 2 — beauty de las moléculas (átomos/enlaces) + fondo. Las líneas
     punteadas y los textos siguen ocultos: se dibujan DESPUÉS del contorno. */
  scene.background=savedBg;
  renderer.setClearColor(savedHex,savedAlpha);
  renderer.render(scene,camera);

  /* Pass 3 — overlay de bordes encima de las moléculas, sin volver a limpiar. */
  scene.background=null; /* evita repintar el fondo en las pasadas siguientes */
  _ppEdgeMat.uniforms.cameraNear.value=camera.near;
  _ppEdgeMat.uniforms.cameraFar.value=camera.far;
  const savedAutoClear=renderer.autoClear;
  renderer.autoClear=false;
  renderer.render(_ppScene,_ppCam);

  /* Pass 4 — líneas punteadas + textos + etiquetas SOBRE el contorno.
     Ocultamos las moléculas (ya dibujadas) pero conservamos su profundidad, así
     las líneas punteadas se siguen ocultando correctamente tras los átomos. */
  groupHigh.visible=false; groupLow.visible=false;
  shapeGroup.visible=vShape; contactGroup.visible=vContact; labelGroup.visible=vLabel;
  renderer.render(scene,camera);

  /* Restaurar estado */
  renderer.autoClear=savedAutoClear;
  groupHigh.visible=vHigh; groupLow.visible=vLow;
  scene.background=savedBg;
}

/* ── Animation loop ── */
(function animate(){requestAnimationFrame(animate);controls.update();renderFrame();})();

/* ── Panel builder ── */

  const body=document.getElementById("panel-body");

    {key:"broken",  label:"Rotos",        dot:"dot-broken",  color:"#ff4d4d",data:DATA.broken,  distOf:r=>r.high},
    {key:"formed",  label:"Formados",     dot:"dot-formed",  color:"#39d353",data:DATA.formed,  distOf:r=>r.low},

      });

      const row=document.createElement("div"); row.className="irow";

  });
  if(!body.querySelector(".ig")){

    empty.textContent="Sin interacciones diferenciales.";
    body.appendChild(empty);
  }
  const rule=document.createElement("div"); rule.className="panel-rule"; body.appendChild(rule);
  const csec=document.createElement("div"); csec.className="csec";
  csec.innerHTML=
    '<div class="csec-hdr">Contactos directos</div>'+
    '<div class="csec-top">'+
    '  <label><input type="checkbox" id="cbContactHigh" checked> high</label>'+
    '  <label><input type="checkbox" id="cbContactLow"  checked> low</label>'+
    '  <span style="color:#506070;margin-left:2px">cutoff</span>'+
    '  <input type="number" id="contactCutoff" class="num-in" value="4.0" step="0.2" min="1.5" max="10">'+
    '  <span style="color:#506070">Å</span>'+
    '</div>'+
    '<div class="elem-grid" id="elemGrid"></div>'+
    '<div class="csec-sub" id="pairSubHdr" style="display:none">Pares de interacción</div>'+
    '<div class="pair-grid" id="pairGrid"></div>'+
    '<div class="csec-sub" style="margin-top:10px">Distancias encontradas</div>'+
    '<div id="contactList"></div>';
  body.appendChild(csec);
  const elems=[...new Set(DATA.symbols)].sort((a,b)=>{
    const o={H:0,O:1,N:2,C:3,S:4,F:5,Cl:6,Br:7,P:8,I:9};
    return (o[a]??99)-(o[b]??99);
  });
  const grid=document.getElementById("elemGrid");
  elems.forEach(elem=>{
    const def=ELEM_DEF[elem]!=null?ELEM_DEF[elem]:1;
    const s=document.createElement("span"); s.className="elem-sym"; s.textContent=elem;
    const inp=document.createElement("input");
    inp.type="number"; inp.className="num-in elem-n-in";
    inp.dataset.elem=elem; inp.value=def; inp.min=0; inp.max=12;
    inp.title=`${elem}: N vecinos más cercanos de otras moléculas`;
    inp.addEventListener("input",rebuildContacts);
    const found=document.createElement("span");
    found.className="elem-found"; found.id="efound-"+elem; found.textContent="—";
    grid.appendChild(s); grid.appendChild(inp); grid.appendChild(found);
  });
  const POLAR=new Set(["H","O","N","F","S","Cl","Br","P","I"]);
  const pairGrid=document.getElementById("pairGrid");
  const pairSubHdr=document.getElementById("pairSubHdr");
  if(elems.length>=2){
    pairSubHdr.style.display="";
    for(let a=0;a<elems.length;a++){
      for(let b=a;b<elems.length;b++){
        const ea=elems[a],eb=elems[b];
        const pk=pairKey(ea,eb);
        const on=POLAR.has(ea)&&POLAR.has(eb);
        const chip=document.createElement("span");
        chip.className="pair-chip"+(on?" on":"");
        chip.dataset.pair=pk; chip.textContent=ea+"–"+eb;
        chip.addEventListener("click",()=>{chip.classList.toggle("on");rebuildContacts();});
        pairGrid.appendChild(chip);
      }
    }
  }
  document.getElementById("cbContactHigh").addEventListener("change",rebuildContacts);
  document.getElementById("cbContactLow").addEventListener("change",rebuildContacts);
  document.getElementById("contactCutoff").addEventListener("input",rebuildContacts);
}


/* ── Multi-dataset navigation ── */
function _recomputeMolOf(){
  const n=DATA.symbols.length,p=Array.from({length:n},(_,i)=>i);
  function find(x){return p[x]===x?x:(p[x]=find(p[x]));}
  (DATA.bonds||[]).forEach(([a,b])=>{const ra=find(a),rb=find(b);if(ra!==rb)p[ra]=rb;});
  const norm={};let id=0;
  molOf=Array.from({length:n},(_,i)=>{const r=find(i);return r in norm?norm[r]:(norm[r]=id++);});
}

function _resetActive(){
  active.broken={}; active.formed={}; active.matched={};
  (DATA.broken||[]).forEach((_,i)=>{active.broken[i]=true;});
  (DATA.formed||[]).forEach((_,i)=>{active.formed[i]=true;});
  (DATA.matched||[]).forEach((_,i)=>{active.matched[i]=true;});
}

function loadEntry(dsKey,modelKey,sysKey){
  const entry=((ALL_DATA.data[dsKey]||{})[modelKey])||{};
  if(!entry[sysKey]) return;
  DATA=entry[sysKey];
  if(typeof contactOff!=="undefined") contactOff.clear();
  _recomputeMolOf();
  _resetActive();
  const el=document.getElementById("resume-info");
  if(el) el.textContent=DATA.info||"";
  buildPanel();
  refresh();
  rebuildContacts();
  fitCamera();
}

function _populateIdx(){
  const ds=document.getElementById("selDs").value;
  const mk=document.getElementById("selModel").value;
  const idxs=((ALL_DATA.indices[ds]||{})[mk])||[];
  const sel=document.getElementById("selIdx");
  const prev=sel.value;
  sel.innerHTML=idxs.map(i=>`<option value="${i}">${i}</option>`).join("");
  if(prev && idxs.includes(prev)) sel.value=prev;
}

function _populateMultiCheckboxes(){
  const ds=document.getElementById("selDs").value;
  const mks=(ALL_DATA.models[ds])||[];
  const box=document.getElementById("multiMkList"); if(!box) return;
  box.innerHTML=mks.map((mk,i)=>{
    const esc=mk.replace(/&/g,"&amp;").replace(/"/g,"&quot;");
    return `<label style="font-size:11px;color:#c0ccd8;display:flex;align-items:center;gap:5px;cursor:pointer;white-space:nowrap">
      <input type="checkbox" class="multi-mk-cb" value="${esc}" ${i<4?"checked":""}> ${mk}</label>`;
  }).join("");
}

function _populateModels(){
  const ds=document.getElementById("selDs").value;
  const mks=(ALL_DATA.models[ds])||[];
  const sel=document.getElementById("selModel");
  sel.innerHTML=mks.map(m=>`<option value="${m}">${m}</option>`).join("");
  _populateIdx();
  _populateMultiCheckboxes();
}
function _loadSelected(){
  loadEntry(
    document.getElementById("selDs").value,
    document.getElementById("selModel").value,
    document.getElementById("selIdx").value
  );
}
document.getElementById("selDs").addEventListener("change",()=>{_populateModels();_loadSelected();});
document.getElementById("selModel").addEventListener("change",()=>{_populateIdx();_loadSelected();});
document.getElementById("selIdx").addEventListener("change",_loadSelected);

function exportMulti(){
  const SQ=1600;
  const ds=document.getElementById("selDs").value;
  const idxVal=document.getElementById("selIdx").value;
  const transp=isTransp();
  const byEl=document.getElementById("cbLowElem").checked;
  const mkList=Array.from(document.querySelectorAll(".multi-mk-cb:checked"))
    .map(cb=>cb.value)
    .filter(mk=>((ALL_DATA.data[ds][mk])||{})[idxVal]!=null);
  if(!mkList.length) return;

  const wrapEl=document.getElementById("viewer-wrap");
  const oldW=wrapEl.clientWidth,oldH=wrapEl.clientHeight,oldAsp=camera.aspect;
  renderer.setSize(SQ,SQ,false);
  camera.aspect=1; camera.updateProjectionMatrix();
  const savedData=DATA;

  function snapSquare(){
    if(transp){
      const savedBg=scene.background;
      scene.background=null; renderer.setClearColor(0x000000,0);
      renderFrame();
      const uri=renderer.domElement.toDataURL("image/png");
      scene.background=savedBg; renderer.setClearColor(0x1b1d23,1);
      renderFrame();
      return uri;
    }
    renderFrame();
    return renderer.domElement.toDataURL("image/jpeg",0.95);
  }

  const imgSrcs=[], labels=[];

  /* forzar checkboxes temporalmente para que rebuildContacts sepa qué lado computar */
  const cbH=document.getElementById("cbHigh");
  const cbL=document.getElementById("cbLow");
  const wasH=cbH.checked, wasL=cbL.checked;

  /* ── Columna 0: solo HIGH (referencia) ── */
  cbH.checked=true; cbL.checked=false;
  DATA=ALL_DATA.data[ds][mkList[0]][idxVal];
  _recomputeMolOf(); _resetActive();
  buildMolGroup(groupHigh,DATA.high,DATA.symbols,DATA.bonds,null);
  rebuildContacts();
  groupHigh.visible=true;  groupLow.visible=false;
  shapeHighGroup.visible=false; shapeLowGroup.visible=false;
  contactHighGroup.visible=true; contactLowGroup.visible=false;
  imgSrcs.push(snapSquare()); labels.push("ref");

  /* ── Columnas 1..N: solo LOW por funcional ── */
  cbH.checked=false; cbL.checked=true;
  mkList.forEach(mk=>{
    DATA=ALL_DATA.data[ds][mk][idxVal];
    _recomputeMolOf(); _resetActive();
    buildMolGroup(groupLow,DATA.low,DATA.symbols,DATA.bonds,byEl?null:LOW_COLOR_INT);
    rebuildContacts();
    groupHigh.visible=false; groupLow.visible=true;
    shapeHighGroup.visible=false; shapeLowGroup.visible=false;
    contactHighGroup.visible=false; contactLowGroup.visible=true;
    imgSrcs.push(snapSquare()); labels.push(mk);
  });

  /* restaurar checkboxes */
  cbH.checked=wasH; cbL.checked=wasL;

  /* ── Restaurar ── */
  DATA=savedData; _recomputeMolOf(); _resetActive();
  renderer.setSize(oldW,oldH,false); camera.aspect=oldAsp; camera.updateProjectionMatrix();
  refresh();

  /* ── Composite ── */
  const totalN=imgSrcs.length;
  const imgEls=imgSrcs.map(src=>{const im=new Image();im.src=src;return im;});
  Promise.all(imgEls.map(im=>new Promise(res=>{if(im.complete)res();else im.onload=res;}))).then(()=>{
    const cv=document.createElement("canvas"); cv.width=SQ*totalN; cv.height=SQ;
    const ctx=cv.getContext("2d");
    if(!transp){ctx.fillStyle="#1b1d23";ctx.fillRect(0,0,cv.width,cv.height);}
    const showLbls=document.getElementById("cbMultiLabels")?.checked;
    imgEls.forEach((im,i)=>{
      ctx.drawImage(im,SQ*i,0);
      if(showLbls){
        ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(SQ*i,SQ-32,SQ,32);
        ctx.fillStyle="#ffffff"; ctx.font="bold 18px 'Times New Roman', Times, serif";
        ctx.textAlign="center"; ctx.fillText(labels[i],SQ*i+SQ/2,SQ-10);
      }
    });
    dlUri(cv.toDataURL(transp?"image/png":"image/jpeg",0.95),"geometry_multi."+(transp?"png":"jpg"));
  });
}

/* ── Multi-export con ÁNGULOS DISTINTOS por funcional (guiado por pasos) ──
   1) captura HIGH (ref) al ángulo actual; 2) muestra el LOW de cada funcional
   aislado para que elijas su ángulo; 3) "Siguiente" lo captura y pasa al
   siguiente; tras el último, ensambla la fila y descarga. */
function exportMultiAngles(){
  if(_capState||_multiCap) return;
  const SQ=1600, transp=isTransp();
  const ds=document.getElementById("selDs").value;
  const idxVal=document.getElementById("selIdx").value;
  const byEl=document.getElementById("cbLowElem").checked;
  const mkList=Array.from(document.querySelectorAll(".multi-mk-cb:checked"))
    .map(cb=>cb.value)
    .filter(mk=>((ALL_DATA.data[ds][mk])||{})[idxVal]!=null);
  if(!mkList.length) return;
  const cbH=document.getElementById("cbHigh"), cbL=document.getElementById("cbLow");
  if(document.activeElement&&document.activeElement.blur) document.activeElement.blur();

  const st={SQ,ds,idxVal,transp,byEl,mkList,
            savedData:DATA,wasH:cbH.checked,wasL:cbL.checked,
            imgSrcs:[],labels:[],step:0};

  /* Columna 0 — HIGH de referencia (al ángulo actual) */
  cbH.checked=true; cbL.checked=false;
  DATA=ALL_DATA.data[ds][mkList[0]][idxVal];
  _recomputeMolOf(); _resetActive();
  buildMolGroup(groupHigh,DATA.high,DATA.symbols,DATA.bonds,null);
  rebuildContacts();
  groupHigh.visible=true; groupLow.visible=false;
  shapeHighGroup.visible=false; shapeLowGroup.visible=false;
  contactHighGroup.visible=true; contactLowGroup.visible=false;
  st.imgSrcs.push(_snapSquare(transp,SQ)); st.labels.push("ref");

  _multiCap=st;
  _multiSetupLow(0);
}
function _multiSetupLow(i){
  const st=_multiCap; if(!st) return;
  const mk=st.mkList[i];
  DATA=ALL_DATA.data[st.ds][mk][st.idxVal];
  _recomputeMolOf(); _resetActive();
  buildMolGroup(groupLow,DATA.low,DATA.symbols,DATA.bonds,st.byEl?null:LOW_COLOR_INT);
  rebuildContacts();
  groupHigh.visible=false; groupLow.visible=true;
  shapeHighGroup.visible=false; shapeLowGroup.visible=false;
  contactHighGroup.visible=false; contactLowGroup.visible=true;
  st.step=i;
  const last=(i===st.mkList.length-1);
  _showCapBar("Ángulo para «"+mk+"» ("+(i+1)+"/"+st.mkList.length+")",
              last?"Capturar y descargar ⬇":"Siguiente ▶", _multiNext);
}
function _multiNext(){
  const st=_multiCap; if(!st) return;
  st.imgSrcs.push(_snapSquare(st.transp,st.SQ));   // funcional actual al ángulo elegido
  st.labels.push(st.mkList[st.step]);
  if(st.step+1<st.mkList.length) _multiSetupLow(st.step+1);
  else _multiFinish();
}
function _multiFinish(){
  const st=_multiCap; if(!st) return; _multiCap=null; _hideCapBar();
  _multiRestore(st); _multiComposite(st);
}
function _multiCancel(){
  const st=_multiCap; if(!st) return; _multiCap=null; _hideCapBar();
  _multiRestore(st);
}
function _multiRestore(st){
  document.getElementById("cbHigh").checked=st.wasH;
  document.getElementById("cbLow").checked=st.wasL;
  DATA=st.savedData; _recomputeMolOf(); _resetActive();
  refresh();
}
function _multiComposite(st){
  const SQ=st.SQ, transp=st.transp, totalN=st.imgSrcs.length;
  const imgEls=st.imgSrcs.map(src=>{const im=new Image();im.src=src;return im;});
  Promise.all(imgEls.map(im=>new Promise(res=>{if(im.complete)res();else im.onload=res;}))).then(()=>{
    const cv=document.createElement("canvas"); cv.width=SQ*totalN; cv.height=SQ;
    const ctx=cv.getContext("2d");
    if(!transp){ctx.fillStyle="#1b1d23";ctx.fillRect(0,0,cv.width,cv.height);}
    const showLbls=document.getElementById("cbMultiLabels")?.checked;
    imgEls.forEach((im,i)=>{
      ctx.drawImage(im,SQ*i,0);
      if(showLbls){
        ctx.fillStyle="rgba(0,0,0,0.55)"; ctx.fillRect(SQ*i,SQ-32,SQ,32);
        ctx.fillStyle="#ffffff"; ctx.font="bold 18px 'Times New Roman', Times, serif";
        ctx.textAlign="center"; ctx.fillText(st.labels[i],SQ*i+SQ/2,SQ-10);
      }
    });
    dlUri(cv.toDataURL(transp?"image/png":"image/jpeg",0.95),"geometry_multi."+(transp?"png":"jpg"));
  });
}

/* ── Wire controls ── */
document.getElementById("fovSlider")?.addEventListener("input",e=>{
  camera.fov=+e.target.value;
  camera.updateProjectionMatrix();
  document.getElementById("fovVal").textContent=e.target.value+"°";
});
["cbHigh","cbLow","cbLowElem"].forEach(id=>
  document.getElementById(id)?.addEventListener("change",refresh));
document.getElementById("modelMode")?.addEventListener("change",refresh);
document.getElementById("renderMode")?.addEventListener("change",refresh);
document.getElementById("cbLabels")?.addEventListener("change",rebuildAtomLabels);
document.getElementById("cbDist")?.addEventListener("change",()=>{rebuildShapes();rebuildContacts();});
document.getElementById("dashSlider")?.addEventListener("input",e=>{
  dashThickFrac=(+e.target.value)/1000;
  document.getElementById("dashVal").textContent=e.target.value;
  rebuildShapes(); rebuildContacts();
});
document.getElementById("labelSlider")?.addEventListener("input",e=>{
  labelSize=+e.target.value;
  document.getElementById("labelVal").textContent=labelSize.toFixed(1);
  rebuildShapes(); rebuildAtomLabels(); rebuildContacts();
});
document.getElementById("capCancel")?.addEventListener("click",()=>{
  _cancelDualAngles();
  if(typeof _multiCancel==="function") _multiCancel();
});
document.getElementById("outlineSlider")?.addEventListener("input",e=>{
  _ppEdgeMat.uniforms.thickness.value=+e.target.value;
  document.getElementById("outlineVal").textContent=e.target.value;
});

/* ── Resume init ── */
_populateModels();
_loadSelected();
updateRenderFrame();
</script>
